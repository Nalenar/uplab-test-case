<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Uplab UI-kit</title>
  </head>
  <body class="page">
    <header class="page__header header">
      <div class="container">Header</div>
    </header>

    <main class="page__content content">
      <div class="container">
        <!-- Headings -->
        <p class="gui__heading">Headings</p>
        <div class="gui__block">
          <div class="gui__container">
            <h1>H1 Heading</h1>
            <h2>H2 Heading</h2>
            <h3>H3 Heading</h3>
            <h4>H4 Heading</h4>

            <p class="text text--button">Button</p>

            <p class="text text--card">Body_card</p>

            <p>Body</p>
          </div>

          <div class="gui__container gui__container--athens">
            <h1>H1 Heading</h1>
            <h2>H2 Heading</h2>
            <h3>H3 Heading</h3>
            <h4>H4 Heading</h4>

            <p class="text text--button">Button</p>

            <p class="text text--card">Body_card</p>

            <p>Body</p>
          </div>

          <div class="gui__container gui__container--black">
            <h1>H1 Heading</h1>
            <h2>H2 Heading</h2>
            <h3>H3 Heading</h3>
            <h4>H4 Heading</h4>

            <p class="text text--button">Button</p>

            <p class="text text--card-white">Body_card</p>

            <p>Body</p>
          </div>
        </div>
        <!-- /Headings -->
      </div>
    </main>

    <footer class="page__footer footer">
      <div class="container">Footer</div>
    </footer>

    <style>
      .gui__heading {
        padding: 10px 25px;
        margin-bottom: 5px;

        background-color: rgb(0, 255, 255);

        font-size: 30px;
        font-style: normal;
        font-weight: 600;
        line-height: normal;

        border-radius: 15px;
      }

      .gui__block {
        display: flex;
      }

      .gui__container {
        background-color: white;
        padding: 10px 75px;
      }

      .gui__container--black {
        background-color: #000;
        color: #fff;
      }

      .gui__container--athens {
        background-color: #f5f5f6;
      }
    </style>
  </body>
</html>
